catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalogs:
  cli:
    '@antfu/eslint-config': ^6.6.1
    '@antfu/ni': ^28.0.0
    '@tailwindcss/vite': ^4.1.13
    bumpp: ^10.3.2
    eslint: ^9.39.2
    lint-staged: ^16.2.7
    publint: ^0.3.16
    simple-git-hooks: ^2.13.1
    tailwindcss: ^4.1.13
    tsx: ^4.21.0
    typescript: ^5.9.3
    vite: ^7.2.7
    vite-plugin-css-injected-by-js: ^3.5.2
  framework:
    '@vitejs/plugin-vue': ^6.0.1
    vue: ^3.5.22
    vue-tsc: ^3.1.0
  inlined:
    '@antfu/utils': ^9.3.0
  testing:
    '@vue/test-utils': ^2.4.6
    jsdom: ^26.1.0
    tinyexec: ^1.0.2
    vitest: ^4.0.15
    vitest-package-exports: ^0.1.1
    yaml: ^2.8.2
  types:
    '@types/node': ^25.0.1
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
